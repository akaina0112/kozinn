<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Textures to Glyph</title>

<style>
/* ===== 基本 ===== */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #000;
  color: #c6c6c6;
  font-family: Minecraftia, sans-serif;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

/* ===== グリッド ===== */
.glyph-grid {
  display: grid;
  grid-template-columns: repeat(16, 1fr);
  gap: 3px;
}

.glyph-cell {
  aspect-ratio: 1/1;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  cursor: pointer;
}

.glyph-cell img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  image-rendering: pixelated;
}

.cell-label {
  position: absolute;
  font-size: 0.7rem;
  color: rgba(255,255,255,0.6);
}

/* ===== UI ===== */
.minecraft-button {
  padding: 6px 12px;
  cursor: pointer;
}

.minecraft-input {
  padding: 6px;
}

/* ===== モーダル ===== */
.modal {
  position: fixed;
  inset: 0;
  display: none;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #1e1e1e;
  padding: 20px;
}
</style>
</head>

<body>

<!-- ===== UI ===== -->
<input id="output-name" value="glyph_E9.png" class="minecraft-input">
<button id="generate-button" class="minecraft-button">Download</button>
<button id="clear-button" class="minecraft-button">Clear</button>
<input type="file" id="file-input" hidden>

<div id="glyph-grid" class="glyph-grid"></div>

<canvas id="canvas" width="256" height="256"></canvas>

<script>
/* ===== データ ===== */
const LOCAL_KEY = "customImagesCache";
const glyphData = new Array(256).fill(null);
const usedImages = new Set();

let currentCell = -1;

/* ===== 初期化 ===== */
window.onload = () => {
  createGrid();
  loadSaved();
  setupEvents();
  setupPaste();
};

/* ===== グリッド生成 ===== */
function createGrid() {
  const grid = document.getElementById("glyph-grid");

  for (let i = 0; i < 256; i++) {
    const cell = document.createElement("div");
    cell.className = "glyph-cell";
    cell.dataset.index = i;

    const label = document.createElement("span");
    label.className = "cell-label";

    const row = Math.floor(i/16).toString(16).toUpperCase();
    const col = (i%16).toString(16).toUpperCase();
    label.textContent = row + col;

    cell.appendChild(label);

    cell.onclick = () => currentCell = i;

    grid.appendChild(cell);
  }
}

/* ===== 保存 ===== */
function saveImage(src) {
  if (usedImages.has(src)) return;

  usedImages.add(src);
  localStorage.setItem(LOCAL_KEY, JSON.stringify([...usedImages]));
}

/* ===== 読み込み ===== */
function loadSaved() {
  const data = localStorage.getItem(LOCAL_KEY);
  if (!data) return;

  try {
    JSON.parse(data).forEach(v => usedImages.add(v));
  } catch {}
}

/* ===== 画像適用 ===== */
function applyImage(src) {
  if (currentCell < 0) return;

  const cell = document.querySelector(`[data-index="${currentCell}"]`);
  cell.innerHTML = "";

  const img = document.createElement("img");
  img.src = src;

  cell.appendChild(img);

  glyphData[currentCell] = { src };
}

/* ===== アップロード ===== */
function handleFile(file) {
  const reader = new FileReader();

  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      if (img.width <= 16 && img.height <= 16) {
        saveImage(e.target.result);
        applyImage(e.target.result);
      } else {
        alert("16x16以下のみ");
      }
    };
    img.src = e.target.result;
  };

  reader.readAsDataURL(file);
}

/* ===== ペースト ===== */
function setupPaste() {
  document.addEventListener("paste", e => {
    for (const item of e.clipboardData.items) {
      if (item.type.includes("image")) {
        handleFile(item.getAsFile());
      }
    }
  });
}

/* ===== 生成 ===== */
function generate() {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0,0,256,256);

  const tasks = [];

  glyphData.forEach((g, i) => {
    if (!g) return;

    const img = new Image();
    const x = (i % 16) * 16;
    const y = Math.floor(i / 16) * 16;

    tasks.push(new Promise(res => {
      img.onload = () => {
        ctx.drawImage(img, x, y, 16, 16);
        res();
      };
      img.src = g.src;
    }));
  });

  Promise.all(tasks).then(() => {
    const a = document.createElement("a");
    a.download = document.getElementById("output-name").value;
    a.href = canvas.toDataURL();
    a.click();
  });
}

/* ===== 全クリア ===== */
function clearAll() {
  if (!confirm("全部消す？")) return;

  document.getElementById("glyph-grid").innerHTML = "";
  createGrid();

  for (let i = 0; i < 256; i++) {
    glyphData[i] = null;
  }
}

/* ===== イベント ===== */
function setupEvents() {
  document.getElementById("generate-button").onclick = generate;
  document.getElementById("clear-button").onclick = clearAll;

  document.addEventListener("keydown", e => {
    if (e.key === "Delete" && currentCell >= 0) {
      glyphData[currentCell] = null;
      const cell = document.querySelector(`[data-index="${currentCell}"]`);
      cell.innerHTML = "";
    }
  });

  document.body.ondrop = e => {
    e.preventDefault();
    if (e.dataTransfer.files[0]) {
      handleFile(e.dataTransfer.files[0]);
    }
  };

  document.body.ondragover = e => e.preventDefault();
}
</script>

</body>
</html>
